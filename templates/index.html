<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHO — Flask</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        color: #18181b;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #09090b;
          color: #fafafa;
        }
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        opacity: 0.8;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flask is running</h1>
      <p>Edit <code>app.py</code> and <code>templates/</code> to build your app.</p>
    </main>
  </body>
</html>
